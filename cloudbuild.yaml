steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.cloudrun', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA', '-t', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest', '.']

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_DATABASE=${_DB_DATABASE},DB_USERNAME=${_DB_USERNAME},DB_PASSWORD=${_DB_PASSWORD},APP_NAME=${_APP_NAME},ENVIRONMENT=${_ENVIRONMENT}'
      - '--memory'
      - '${_MEMORY}'
      - '--cpu'
      - '${_CPU}'
      - '--timeout'
      - '3600'

images:
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:latest'

substitutions:
  _SERVICE_NAME: 'vhudi'
  _REGION: 'us-central1'
  _MEMORY: '1Gi'
  _CPU: '1'
  _DB_HOST: ''
  _DB_PORT: '3306'
  _DB_DATABASE: 'vhudi'
  _DB_USERNAME: ''
  _DB_PASSWORD: ''
  _APP_NAME: 'VHUDI'
  _ENVIRONMENT: 'production'

options:
  machineType: 'N1_HIGHCPU_8'
